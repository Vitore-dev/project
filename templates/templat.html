<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello, World!</title>
    <!-- Optional: a little style to make it look nice -->
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, Helvetica, sans-serif;
        }
        .message {
            font-size: 3rem;
            color: #333;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            padding: 2rem;
            background-color: white;
            border-radius: 1rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="message">
        Hello, World! 🌍
    </div>
</body>
</html>
